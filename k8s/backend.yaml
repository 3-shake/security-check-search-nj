apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: asia-northeast1-docker.pkg.dev/welcome-study-sakamoto/security-check-repo/backend:latest
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          ports:
            - containerPort: 8080
          env:
            - name: BLEVE_INDEX_PATH
              value: "/tmp/controls.bleve"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgres://postgres:$(DB_PASSWORD)@127.0.0.1:5432/security_check?sslmode=disable"
              

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
          
          
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
              cpu: "100m"
          args:
          - "--port=5432"
          - "welcome-study-sakamoto:asia-northeast1:security-check-db-instance"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  annotations:
    cloud.google.com/backend-config: '{"ports": {"http-backend": "backend-hc-config"}}'
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - name: http-backend
    port: 8080
    targetPort: 8080




      
     

       
        