syntax = "proto3";

package security.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/asuka-sakamoto/security-system/gen/proto/security/v1;securityv1";

// ---------------------------------------------------------
// サービス定義（APIエンドポイント）
// ---------------------------------------------------------
service SecurityService {
  // 疎通確認用
  rpc Ping (PingRequest) returns (PingResponse) {}

  // 1. Control（ナレッジ）管理API
  rpc ListControls (ListControlsRequest) returns (ListControlsResponse) {}
  rpc GetControl (GetControlRequest) returns (GetControlResponse) {}
  rpc CreateControl (CreateControlRequest) returns (CreateControlResponse) {}
  rpc UpdateControl (UpdateControlRequest) returns (UpdateControlResponse) {}
  rpc DeleteControl(DeleteControlRequest) returns (DeleteControlResponse) {}
  rpc GetDashboardStats(GetDashboardStatsRequest) returns (GetDashboardStatsResponse);

  // 2. 検索API
  rpc SearchControls (SearchControlsRequest) returns (SearchControlsResponse) {}

  // 3. 未マッチタスク（unmatched）API
  rpc ListUnmatchedTasks (ListUnmatchedTasksRequest) returns (ListUnmatchedTasksResponse) {}

  // 4. 活動履歴（feed）API
  rpc ListFeedEvents (ListFeedEventsRequest) returns (ListFeedEventsResponse) {}
}

// ---------------------------------------------------------
// 共通メッセージ（データ型）
// ---------------------------------------------------------

// Control本体のデータ構造
message Control {
  string id = 1;
  string title = 2;
  string question = 3;
  string answer = 4;
  string category = 5;
  repeated string tags = 6;
  string version = 7;
  string updated_by = 8;
  google.protobuf.Timestamp updated_at = 9;
  string status = 10;
}

// Controlの変更履歴（バージョン）
message ControlVersion {
  string control_id = 1;
  int32 version = 2;
  string changed_by = 3;
  google.protobuf.Timestamp changed_at = 4;
  // Diff等のJSONは文字列として扱う
  string diff_json = 5; 
}

// 未マッチタスク
message UnmatchedTask {
  int32 id = 1;
  string original_file_name = 2;
  int32 row_number = 3;
  string question_text = 4;
  string status = 5;
  google.protobuf.Timestamp created_at = 6;
}

// イベント履歴（フィード）
message FeedEvent {
  int32 id = 1;
  string event_type = 2;
  string control_id = 3;
  string user_name = 4;
  string description = 5;
  google.protobuf.Timestamp created_at = 6;
  string control_title = 7;
}

// ---------------------------------------------------------
// リクエスト＆レスポンス メッセージ
// ---------------------------------------------------------

message PingRequest { string message = 1; }
message PingResponse { string message = 1; }

message ListControlsRequest {
  int32 limit = 1;          // 取得件数（0の場合はデフォルト50）
  int32 offset = 2;         // オフセット（ページネーション用）
  string sort_field = 3;    // ソート対象フィールド（"updated_at", "title", "category"）
  string sort_order = 4;    // ソート順（"asc" or "desc"、デフォルト "desc"）
}
message ListControlsResponse {
  repeated Control controls = 1;
  int32 total_count = 2;    // フィルター前の総件数（ページネーション用）
}

message GetControlRequest {
  string id = 1;
}
message GetControlResponse {
  Control control = 1;
  repeated ControlVersion history = 2; // 詳細画面用（過去の履歴も返す）
}

message CreateControlRequest {
  string title = 1;
  string category = 2;
  repeated string tags = 3;
  string question = 4;
  string answer = 5;
  string unmatched_task_id = 6; // ★ これを追加
}
message CreateControlResponse {
  Control control = 1;
}

message SearchControlsRequest {
  string query = 1;
}
message SearchControlsResponse {
  repeated Control hits = 1;
}
message UpdateControlRequest {
  string id = 1;
  string title = 2;
  string question = 3;
  string answer = 4;
  string category = 5;
  repeated string tags = 6;
  string updated_by = 7;
}

message UpdateControlResponse {
  Control control = 1;
}
message ListUnmatchedTasksRequest {}
message ListUnmatchedTasksResponse {
  repeated UnmatchedTask tasks = 1;
}

message ListFeedEventsRequest {}
message ListFeedEventsResponse {
  repeated FeedEvent events = 1;
}
message DeleteControlRequest {
  string id = 1;
}

message DeleteControlResponse {
  bool success = 1;
}
// ダッシュボード統計情報取得用リクエスト
message GetDashboardStatsRequest {}

// ダッシュボード統計情報取得用レスポンス
message GetDashboardStatsResponse {
  int32 total_controls = 1;      // 登録済みナレッジ（Control）の総数
  int32 pending_unmatched = 2;   // 未マッチ質問の残り件数
  // 必要に応じて「今週の更新数」などを追加することも可能です
  int32 team_updates = 3;
}