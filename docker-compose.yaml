version: '3.8'

services:
  db:
    image: postgres:16
    container_name: security-check-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: security_check
    ports:
      - "5433:5432"  # ← ここを変更！（ホストの5433番を、コンテナ内の5432番に繋ぐ）
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: